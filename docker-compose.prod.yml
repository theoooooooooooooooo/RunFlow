# Environnement de préproduction/production : Nginx + PHP-FPM + MySQL, séparés en 2 réseaux Docker
name: runflow_prod
services:
  # Application PHP-FPM (voir docker/php/Dockerfile.prod pour le build de l'image)
  app:
      build:
        context: .
        dockerfile: docker/php/Dockerfile.prod
      container_name: runflow_prepod_app
      # Redémarre automatiquement le conteneur sauf s'il a été arrêté volontairement
      restart: unless-stopped
      # Toutes les valeurs sensibles viennent du fichier .env.prepod fourni au déploiement (jamais en dur ici)
      environment:
        APP_ENV: prod
        APP_SECRET: ${APP_SECRET}
        DATABASE_URL: ${DATABASE_URL}
        MESSENGER_TRANSPORT_DSN: ${MESSENGER_TRANSPORT_DSN}
        MAILER_DSN: ${MAILER_DSN}
        DEFAULT_URI: ${DEFAULT_URI}
      # Accessible depuis Nginx (web) et depuis la base de données (internal), mais pas directement depuis l'extérieur
      networks:
        - web
        - internal

  # Reverse proxy Nginx : seul point d'entrée exposé publiquement, sert les fichiers statiques et relaie le PHP à "app"
  web:
    image: nginx:1.27-alpine
    container_name: runflow_prepod_web
    restart: unless-stopped
    volumes:
      # Config Nginx spécifique à la préproduction
      - ./docker/nginx/prepod.conf:/etc/nginx/conf.d/default.conf
      # Code source monté en lecture seule (Nginx sert directement public/, sans passer par PHP, pour les assets)
      - .:/var/www/html:ro
    networks:
      - web
      - internal
    labels:
      - "com.runflow.env=prepod"

  # Base de données, isolée du réseau "web" : uniquement joignable par le conteneur "app"
  database:
    image: mysql:8.0
    container_name: runflow_prepod_db
    restart: unless-stopped
    # Identifiants fournis via .env.prepod, jamais commités en clair
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - prepod_mysql_data:/var/lib/mysql
    networks:
      - internal

networks:
  # Réseau externe partagé (probablement avec un reverse proxy/traefik global du VPS) : doit déjà exister
  web:
    external: true
  # Réseau interne propre à ce projet, créé automatiquement, non exposé à l'extérieur
  internal:
    driver: bridge

volumes:
  # Volume externe : survit à un "docker compose down" pour ne jamais perdre les données en prépod
  prepod_mysql_data:
    external: true
    name: app_prepod_mysql_data
