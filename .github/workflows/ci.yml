name: CI

on:
  push:
    branches:
      - Dev
      - prepod
      - main
  pull_request:
    branches:
      - Dev
      - prepod
      - main

jobs:
  tests:
    name: Tests et qualite du code
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: ${{ secrets.CI_MYSQL_ROOT_PASSWORD }}
          MYSQL_DATABASE: runflow
          MYSQL_USER: runflow
          MYSQL_PASSWORD: ${{ secrets.CI_MYSQL_PASSWORD }}
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Recuperation du code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Installation de PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2
        with:
          php-version: '8.4'
          extensions: pdo, pdo_mysql, zip, intl
          coverage: none

      - name: Creation du fichier .env pour le kernel Symfony
        env:
          CI_DB_PASSWORD: ${{ secrets.CI_MYSQL_PASSWORD }}
        run: |
          echo "APP_ENV=test" > .env
          echo "APP_SECRET=ci_secret_temporaire" >> .env
          echo "KERNEL_CLASS='App\Kernel'" >> .env
          echo "DATABASE_URL=mysql://runflow:${CI_DB_PASSWORD}@127.0.0.1:3306/runflow?serverVersion=8.0" >> .env
          echo "MESSENGER_TRANSPORT_DSN=doctrine://default?auto_setup=0" >> .env
          echo "MAILER_DSN=null://null" >> .env
          echo "DEFAULT_URI=http://localhost" >> .env

      - name: Cache des dependances Composer
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Installation des dependances
        run: composer install --prefer-dist --no-progress --no-interaction --no-scripts

      - name: Verification de la syntaxe PHP
        run: find src tests -name "*.php" -exec php -l {} \;

      - name: Verification de la syntaxe des fichiers Twig et YAML
        run: |
          php bin/console lint:twig templates --env=test
          php bin/console lint:yaml config --env=test

      - name: Attente de la disponibilite de MySQL
        env:
          CI_ROOT_PASSWORD: ${{ secrets.CI_MYSQL_ROOT_PASSWORD }}
        run: |
          for i in {1..30}; do
            mysqladmin ping -h 127.0.0.1 -uroot -p"${CI_ROOT_PASSWORD}" --silent && break
            sleep 2
          done

      - name: Octroi des droits sur la base de test
        env:
          CI_ROOT_PASSWORD: ${{ secrets.CI_MYSQL_ROOT_PASSWORD }}
        run: |
          mysql -h 127.0.0.1 -uroot -p"${CI_ROOT_PASSWORD}" -e "GRANT ALL PRIVILEGES ON \`runflow_test\`.* TO 'runflow'@'%'; FLUSH PRIVILEGES;"

      - name: Creation de la base de donnees de test
        env:
          CI_DB_PASSWORD: ${{ secrets.CI_MYSQL_PASSWORD }}
        run: |
          export DATABASE_URL="mysql://runflow:${CI_DB_PASSWORD}@127.0.0.1:3306/runflow?serverVersion=8.0"
          php bin/console doctrine:database:create --env=test --if-not-exists
          php bin/console doctrine:migrations:migrate --env=test --no-interaction

      - name: Execution des tests PHPUnit
        env:
          CI_DB_PASSWORD: ${{ secrets.CI_MYSQL_PASSWORD }}
        run: |
          export DATABASE_URL="mysql://runflow:${CI_DB_PASSWORD}@127.0.0.1:3306/runflow?serverVersion=8.0"
          php bin/phpunit --testdox

  deploy:
    name: Deploiement en preproduction
    runs-on: ubuntu-latest
    needs: tests
    if: github.ref == 'refs/heads/prepod' && github.event_name == 'push'

    steps:
      - name: Deploiement sur le VPS via SSH
        uses: appleboy/ssh-action@029f5b4aeeeb58fdfe1410a5d17f967dacf36262 # v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd ${{ secrets.VPS_APP_PATH }}
            git pull origin prepod
            docker compose -f docker-compose.prod.yml --env-file .env.prepod up -d --build
            docker image prune -f